<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veiculo para vender mais ràpido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulario</p>
            </div>
        </div>
        <div class="form-body">
            <h1 class="titulo-form">Venda facil seu carro</h1>
            <p>Descreva as caracteristicas do seu carro e marque os opcionais que ele possui</p>
            <form>
                <div class="caixaInputs">
                    <label for="title">Titulo do anuncio <span class="campo-obrigatorio"></span></label>
                    <input type="text" name="title" id="title"class="block" placeholder="Digite um titulo para o anuncio">
                 </div>
                  <div class="caixaInputs">
                    <label for="title">Preço <span class="campo-obrigatorio"></span></label>
                    <input type="number" name="title" id="title"class="block" placeholder="Digite o preço">
                    </div>
                    <div class="caixaInputs">
                        <label for="descricao">Descrição<span class="campo-obrigatorio">*</span></span></label>
                        <textarea name="descricao" id="descricao"class="block" placeholder="Digite adescrição de seu veiculo"></textarea>
                    </div>
            </form>
        </div>
    </div>
</body>
</html>
